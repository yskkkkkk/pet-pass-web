<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pet-Pass Tech Blog</title>

  <!-- Favicons -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    body {
      background-color: var(--bg-secondary);
      font-family: 'Pretendard', sans-serif;
      margin: 0;
      padding: 0;
      color: var(--text-primary);
    }
    
    .blog-header {
      background: var(--surface);
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .blog-header h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 800;
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .blog-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .blog-post-card {
      background: var(--bg-primary);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      text-decoration: none;
      display: block;
    }

    .blog-post-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .blog-post-date {
      font-size: 13px;
      color: var(--text-tertiary);
      margin-bottom: 8px;
    }

    .blog-post-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0 0 10px 0;
    }

    .blog-post-summary {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin: 0;
    }

    .back-btn-container {
      max-width: 800px;
      margin: 20px auto 0;
      padding: 0 20px;
    }

    .btn-back-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 30px;
      color: var(--text-primary);
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s;
    }

    .btn-back-home:hover {
      background: var(--bg-secondary);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>

  <header class="blog-header glass">
    <h1>🐾 Pet-Pass Dev Blog</h1>
  </header>

  <div class="back-btn-container">
    <a href="/" class="btn-back-home">
      <span>←</span> Pet-Pass 메인으로
    </a>
  </div>

  <main class="blog-container">

    <!-- 첫 번째 더미 게시물 -->
    <a href="/blog/post1.html" class="blog-post-card glass">
      <div class="blog-post-date">2026. 04. 22</div>
      <h2 class="blog-post-title">Pet-Pass 서비스 런칭 회고록</h2>
      <p class="blog-post-summary">반려동물 출입가능 매장 지도를 만들며 겪었던 기술적 고민들과, 바텀시트 UI 개선 등의 경험을 공유합니다.</p>
    </a>

    <!-- 추가 게시물을 여기에 직접 HTML로 작성하시면 됩니다 -->

  </main>

</body>
</html>
