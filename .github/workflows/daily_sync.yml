name: Daily Store Data Sync

on:
  schedule:
    - cron: '27 0 * * *'
    - cron: '10 12 * * *'
  workflow_dispatch: # Allow manual trigger



jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
      PET_EXCEL_URL: ${{ secrets.PET_EXCEL_URL }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Validate required secrets
        run: |
          if [ -z "$KAKAO_REST_API_KEY" ]; then
            echo "KAKAO_REST_API_KEY secret 이 필요합니다."
            exit 1
          fi

      - name: Run Data Collection Script
        run: node scripts/sync-stores.js

      - name: Commit and Push if Changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stores.json docs/schedule_history.md
          if git diff --staged --quiet; then
            echo "No changes found."
          else
            git commit -m "chore: update pet-friendly stores data"
            git push
          fi
