name: Daily Store Data Sync

on:
  schedule:
    - cron: '27 0 * * *'
    - cron: '10 12 * * *'
  workflow_dispatch: # Allow manual trigger



jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
      PET_EXCEL_URL: ${{ secrets.PET_EXCEL_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Validate required secrets
        run: |
          missing=0

          check_secret() {
            local name="$1"
            local value="$2"

            if [ -z "$value" ]; then
              echo "::error::${name} secret 이 비어있거나 설정되지 않았습니다."
              missing=1
            else
              echo "✅ ${name} is set"
            fi
          }

          check_secret "KAKAO_REST_API_KEY" "$KAKAO_REST_API_KEY"
          check_secret "SUPABASE_URL" "$SUPABASE_URL"
          check_secret "SUPABASE_SECRET_KEY" "$SUPABASE_SECRET_KEY"

          if [ "$missing" -ne 0 ]; then
            echo "필수 secret 누락으로 작업을 중단합니다."
            exit 1
          fi

      - name: Run Data Collection Script
        run: node scripts/sync-stores.js

      - name: Commit and Push if Changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stores.json docs/schedule_history.md
          if git diff --staged --quiet; then
            echo "No changes found."
          else
            git commit -m "chore: update pet-friendly stores data [skip ci]"
            git push
          fi
