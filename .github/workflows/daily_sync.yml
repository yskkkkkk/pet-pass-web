name: Daily Store Data Sync

on:
  schedule:
    # 02:00 KST = 17:00 UTC (previous day)
    # 10:00 KST = 01:00 UTC
    # 18:00 KST = 09:00 UTC
    - cron: '0 17 * * *'
    - cron: '0 1 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch: # Allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.5.0
        with:
          node-version: '24'

      - name: Run Data Collection Script
        env:
          PET_PORTAL_URL: ${{ secrets.PET_PORTAL_URL }}
        run: node scripts/sync-stores.js

      - name: Commit and Push if Changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stores.json docs/schedule_history.md
          if git diff --staged --quiet; then
            echo "No changes found."
          else
            git commit -m "chore: update pet-friendly stores data [skip ci]"
            git push
          fi
