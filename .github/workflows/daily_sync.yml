name: Daily Store Data Sync

on:
  schedule:
    - cron: '27 0 * * *'
    - cron: '10 12 * * *'
  workflow_dispatch: # Allow manual trigger



jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
      PET_EXCEL_URL: ${{ secrets.PET_EXCEL_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Validate required secrets
        run: |
          missing=0

          check_secret() {
            local name="$1"
            local value="$2"

            if [ -z "$value" ]; then
              echo "::error::${name} secret 이 비어있거나 설정되지 않았습니다."
              missing=1
            else
              echo "✅ ${name} is set"
            fi
          }

          check_secret "KAKAO_REST_API_KEY" "$KAKAO_REST_API_KEY"
          check_secret "SUPABASE_URL" "$SUPABASE_URL"
          check_secret "SUPABASE_SECRET_KEY" "$SUPABASE_SECRET_KEY"

          if [ "$missing" -ne 0 ]; then
            echo "필수 secret 누락으로 작업을 중단합니다."
            exit 1
          fi

      - name: Run Data Collection Script
        id: sync
        continue-on-error: true
        run: node scripts/sync-stores.js

      - name: Update schedule history
        if: always()
        run: |
          FILE=docs/schedule_history.md
          TS=$(TZ=Asia/Seoul date '+%Y. %-m. %-d. %p %-I:%M:%S')

          if [ "${{ steps.sync.outcome }}" = "success" ]; then
            RESULT="✅ 성공"
            NOTE="자동 수집 완료"
          else
            RESULT="❌ 실패"
            NOTE="GitHub Actions 로그 확인 필요"
          fi

          ENTRY="| ${TS} | ${RESULT} | ${NOTE} |"

          if [ ! -f "$FILE" ]; then
            cat > "$FILE" <<'EOT'
# 🕒 데이터 수집 스케줄링 이력

> GitHub Actions(`daily_sync.yml`) 실행 시, 최신 결과가 표 최상단에 자동으로 기록됩니다.

| 일시 (KST) | 결과 | 비고 |
| :--- | :--- | :--- |
EOT
          fi

          awk -v entry="$ENTRY" '
            NR==1 { print; next }
            NR==2 { print; next }
            NR==3 { print; next }
            NR==4 { print; print entry; next }
            { print }
          ' "$FILE" > "$FILE.tmp"

          mv "$FILE.tmp" "$FILE"

      - name: Commit and Push if Changed
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stores.json docs/schedule_history.md
          if git diff --staged --quiet; then
            echo "No changes found."
          else
            git commit -m "chore: update pet-friendly stores data [skip ci]"
            git push
          fi

      - name: Fail workflow if sync failed
        if: always() && steps.sync.outcome != 'success'
        run: |
          echo "데이터 수집 스크립트가 실패했습니다. 위 로그를 확인하세요."
          exit 1
